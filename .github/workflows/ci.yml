name: CI

# CICD-01: pytest + Ruff gate, blocking on every push and pull_request.
# Deliberately the safe PR trigger below, NEVER its "_target" variant — the latter
# would run a forked PR's untrusted code with write/secret access (T-18-CIPRIV).
# Top-level `permissions: contents: read` denies write even to the default GITHUB_TOKEN.
on:
  push:
  pull_request:

permissions:
  contents: read # least-privilege — this workflow only reads code and runs tests/lint

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # pgvector/pgvector:pg16 ships the `vector` extension pre-built, so
      # `CREATE EXTENSION IF NOT EXISTS vector;` (SCHEMA_SQL's first statement,
      # run by init_db()) only needs to activate it, not compile it.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dexter
          POSTGRES_PASSWORD: dexter
          POSTGRES_DB: dexter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # D-15: unskips the ~107 live-DB tests with zero secrets and zero Neon traffic.
      # No Gemini API key here — every live-DB test embedding is a synthetic literal
      # ([0.1] * config.EMBED_DIM), never a real Gemini call (confirmed at research time).
      TEST_DATABASE_URL: postgresql://dexter:dexter@localhost:5432/dexter_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt

      - run: ruff check .
      - run: ruff format --check .

      # The audio-source tests (Phase 27 crossfade + opus fast path) construct a
      # REAL discord.FFmpegOpusAudio and assert isinstance — mocking would defeat
      # them — so the runner needs the ffmpeg binary the bot depends on at runtime.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pytest -q

  # Phase 23 / D-02, D-03: builds the Astro portfolio site and byte-checks the
  # invite URL in the SHIPPED artifact. Stays unprivileged (contents: read is
  # enough) and runs on every push AND every PR — it is a gate, not a deploy.
  # The privileged Pages deploy lives in its own pages.yml (D-03) because
  # actions/deploy-pages needs elevated Pages/OIDC permissions this
  # PR-triggered workflow must never grant (T-18-CIPRIV).
  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps (drift scan needs pytest + config.py/logic/invite.py's discord import)
        working-directory: .
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Drift-scan the built artifact
        working-directory: .
        env:
          # D-02: without this, a missing dist/ silently SKIPS the test and CI
          # stays green forever while the shipped page carries a wrong invite URL.
          SITE_DIST_REQUIRED: "1"
        run: pytest -q tests/test_site_drift_guard.py
