name: Release Image

# Phase 23 / CICD-03, D-16.
# Publishes the existing Dockerfile, unchanged, to GHCR on a `v*` tag.
# Needs packages: write — exactly why this is its OWN file and never a job
# in ci.yml (D-16). ci.yml's PR-triggered runs must never see this permission.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # D-16: multi-arch is load-bearing, not gold-plating — the most
      # plausible future always-on host is a Raspberry Pi (arm64). QEMU
      # emulation is cheap here: every native dependency (PyNaCl, davey,
      # asyncpg, pgvector) ships prebuilt manylinux_aarch64 wheels for
      # cp311 (verified against PyPI), and pgvector itself is pure Python —
      # nothing compiles under emulation.
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # Built-in GITHUB_TOKEN only — never a new PAT. Introducing one here
      # would break the zero-secrets-in-CI posture and is the same reason
      # D-17's GHCR visibility flip stays a manual step rather than automated.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag set (planner's call, D-16): the raw tag ref (v1.4.0-rc1 publishes
      # :v1.4.0-rc1 literally), the semver version, and a short-SHA tag for
      # traceability. `latest=auto` means only a non-prerelease semver tag
      # also gets :latest — a `-rcN` tag deliberately does NOT become :latest.
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/jadrianports/dexter
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
          flavor: |
            latest=auto

      # Publishes the Dockerfile UNCHANGED. Its secrets-at-runtime posture
      # (T-04-05) is preserved: no build-arg or --secret carries a credential
      # into a layer here.
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
