# Dexter Docker Compose — host-on-PC + Neon Singapore stack
# Usage: docker compose up -d --build
# Prereqs: copy .env.example to .env, fill in DISCORD_TOKEN, GEMINI_API_KEY,
#          GENIUS_TOKEN, and DATABASE_URL (Neon DSN, sslmode=require).
# DB is Neon (managed Postgres) — no colocated Postgres container. The bot's
# ssl='require' (bot.py) matches Neon's mandatory SSL.

services:
  # ── Dexter bot ──────────────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      # No platform pin — builds native for the host (amd64 on a PC, arm64 on a Pi).
    # Load all env vars from .env (DISCORD_TOKEN, GEMINI_API_KEY, GENIUS_TOKEN,
    # DATABASE_URL=Neon DSN, etc.). DATABASE_URL is NOT overridden here — the bot
    # connects directly to Neon (the colocated-Postgres override is retired legacy).
    env_file: .env
    volumes:
      # Paths match config.AUDIO_CACHE_DIR (BASE_DIR / "data" / "cache") and config.LOG_DIR
      - audio_cache:/app/data/cache
      - logs:/app/logs
    restart: unless-stopped

# ── Named volumes ───────────────────────────────────────────────────────────────────
# Both survive `docker compose down` (not --volumes). Only `docker compose down -v` wipes them.
volumes:
  audio_cache:
  logs:
